<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | FarsiFlow</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0ea5e9">
</head>

<body>

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<div class="container">
  <h1>Contact FarsiFlow 📩</h1>

  <p>
    Have feedback, suggestions, or found an issue?  
    I'd love to hear from you 👇
  </p>

  <!-- Optional: RTL Persian feel -->
  <div class="contact-card">
    <form id="contactForm" dir="rtl">
      <div class="contact-group">
        <label for="name">نام شما (Your Name)</label>
        <input type="text" id="name" class="contact-input" placeholder="Enter your name" required>
      </div>

      <div class="contact-group">
        <label for="email">ایمیل شما (Your Email)</label>
        <input type="email" id="email" class="contact-input" placeholder="username@example.com" required>
      </div>

      <div class="contact-group">
        <label for="message">پیام شما (Your Message)</label>
        <textarea id="message" class="contact-textarea" placeholder="Type your message here..." required></textarea>
      </div>

      <button type="submit" class="contact-form-btn">ارسال پیام / Send Message 🚀</button>
    </form>
    <div id="status" class="contact-status"></div>
  </div>
</div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("WOOkqRSQ0vMflbWWI");
})();
</script>

<script src="contact.js"></script>

<script>
function goBack() {
  window.history.back();
}
</script>
<script src="layout.js"></script>
</body>
</html>
